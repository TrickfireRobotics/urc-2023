# Placeholder ompl_planning.yaml for MoveIt 2 arm configuration
# Defines OMPL planner settings for motion planning
# Replace with actual planning group name and tuned parameters

planning_plugin: ompl_interface/OMPLPlanner
request_adapters: >-
  default_planner_request_adapters/AddTimeOptimalParameterization
  default_planner_request_adapters/ResolveConstraintFrames
  default_planner_request_adapters/FixWorkspaceBounds
  default_planner_request_adapters/FixStartStateBounds
  default_planner_request_adapters/FixStartStateCollision
  default_planner_request_adapters/FixStartStatePathConstraints
start_state_max_bounds_error: 0.1
start_state_max_dt: 0.5
start_state_max_dt_offset: 0.5
projection_evaluator: joints(joint_1,joint_2)  # Replace with key joints for projection
enforce_constrained_state_space: true

arm:  # Planning group name - replace with your group (e.g., "arm")
  default_planner_config: RRTConnect
  planner_configs:
    - SBL:
        type: geometric::SBL
        range: 0.0  # Max motion added to tree
        num_threads: 4
    - EST:
        type: geometric::EST
        range: 0.0
        goal_bias: 0.05
    - LBKPIECE:
        type: geometric::LBKPIECE
        range: 0.0
        border_fraction: 0.9
        min_valid_path_fraction: 0.5
    - BKPIECE:
        type: geometric::BKPIECE
        range: 0.0
        border_fraction: 0.9
        failed_expansion_score_factor: 0.5
        min_valid_path_fraction: 0.5
    - KPIECE:
        type: geometric::KPIECE
        range: 0.0
        goal_bias: 0.05
        border_fraction: 0.9
        failed_expansion_score_factor: 0.5
        min_valid_path_fraction: 0.5
    - RRT:
        type: geometric::RRT
        range: 0.0
        goal_bias: 0.05
    - RRTConnect:
        type: geometric::RRTConnect
        range: 0.0
    - RRTstar:
        type: geometric::RRTstar
        range: 0.0
        delay_collision_checking: 1
        goal_bias: 0.05
    - TRRT:
        type: geometric::TRRT
        range: 0.0
        frountier_threshold: 0.0
        frountier_node_ratio: 0.1
        k_constant: 0.0
        goal_bias: 0.05
    - PRM:
        type: geometric::PRM
        max_nearest_neighbors: 10
    - PRMstar:
        type: geometric::PRMstar
    - FMT:
        type: geometric::FMT
        num_samples: 1000
        radius_multiplier: 1.1
        nearest_k: 1
        cache_cc: 1
        heuristics: 0
        extended_fmt: 1
    - BFMT:
        type: geometric::BFMT
        num_samples: 1000
        radius_multiplier: 1.1
        nearest_k: 1
        balanced: 0
        optimality: 1
        heuristics: 1
        cache_cc: 1
        extended_fmt: 1
    - PDST:
        type: geometric::PDST
    - STRIDE:
        type: geometric::STRIDE
        range: 0.0
        goal_bias: 0.05
    - BiTRRT:
        type: geometric::BiTRRT
        range: 0.0
        temp_change_factor: 2.0
        init_temperature: 100
        frountier_threshold: 0.0
        frountier_node_ratio: 0.1
        cost_threshold: 1e300
    - LBTRRT:
        type: geometric::LBTRRT
        range: 0.0
        goal_bias: 0.05
        epsilon: 0.4
        goal_bias: 0.05
    - BiEST:
        type: geometric::BiEST
        range: 0.0
        goal_bias: 0.05
    - ProjEST:
        type: geometric::ProjEST
        range: 0.0
        goal_bias: 0.05
    - LazyPRM:
        type: geometric::LazyPRM
        range: 0.0
    - LazyPRMstar:
        type: geometric::LazyPRMstar
    - SPARS:
        type: geometric::SPARS
        stretch_factor: 3.0
        sparse_delta_fraction: 0.25
        dense_delta_fraction: 0.001
        max_failures: 1000
    - SPARStwo:
        type: geometric::SPARStwo
        stretch_factor: 3.0
        sparse_delta_fraction: 0.25
        dense_delta_fraction: 0.001
        max_failures: 5000
  longest_valid_segment_fraction: 0.005