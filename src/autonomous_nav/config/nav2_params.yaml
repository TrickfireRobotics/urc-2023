controller_server:
  ros__parameters:
    # controller server parameters (see Controller Server for more info)
    # Path is received from planner_server on /plan topic via FollowPath action
    planned_path_topic: "/plan"
    #front right, rear right, rear left, front left 
    footprint: "[[0.28, -0.37], [-1, -0.37], [-1, 0.28], [0.28, 0.28]]"
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"] # progress_checker_plugin: "progress_checker" For Humble and older
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
      stateful: True

    # DWB controller parameters
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.02
      max_vel_y: 0.01
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.02
      min_speed_theta: 0.0
      acc_lim_x: 1.0 #was 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -1.0 #was -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.25
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics:
        [
          "RotateToGoal",
          "Oscillation",
          "BaseObstacle",
          "GoalAlign",
          "PathAlign",
          "PathDist",
          "GoalDist",
        ]
      BaseObstacle.scale: 0.2
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

planner_server:
  ros__parameters:
    #front right, rear right, rear left, front left 
    footprint: "[[0.28, -0.37], [-1, -0.37], [-1, 0.28], [0.28, 0.28]]"
    # planner server parameters (see Planner Server for more info)
    planner_frequency: 1.0
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.25
      use_astar: true
      allow_unknown: true
      use_final_approach_orientation: true

local_costmap:
  local_costmap:
    ros__parameters:
      #front right, rear right, rear left, front left 
      footprint: "[[0.28, -0.37], [-1, -0.37], [-1, 0.28], [0.28, 0.28]]"
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: zed_camera_link
      transform_tolerance: 0.1
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      #If_Break_Return
      #plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: filtered_cloud
        filtered_cloud:
          topic: /filtered_point_cloud
          sensor_frame: zed_left_camera_frame
          data_type: "PointCloud2"
          marking: true
          clearing: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        #Return to 3.0 for better performance
        cost_scaling_factor: 1.0
        inflation_radius: 0.55

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      rolling_window: true        # ← ADD THIS - makes it follow the robot
      width: 50                    # ← ADD THIS - total width in meters
      height: 50                   # ← ADD THIS - total height in meters
      resolution: 0.05             # ← ADD THIS - cell size
      #front right, rear right, rear left, front left 
      footprint: "[[0.28, -0.37], [-1, -0.37], [-1, 0.28], [0.28, 0.28]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: filtered_cloud
        filtered_cloud:
          topic: /filtered_point_cloud
          sensor_frame: zed_left_camera_frame
          data_type: "PointCloud2"
          marking: true
          clearing: true
          min_obstacle_height: 0.1
          max_obstacle_height: 2.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55
        cost_scaling_factor: 1.0
        inflate_unknown: false
        inflate_around_unknown: true
        always_send_full_costmap: True
        introspection_mode: "disabled"