ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: false
    map_frame: map
    odom_frame: odom
    base_link_frame: zed_camera_link
    world_frame: map

    odom0: "/zed/zed_node/odom"
    odom0_config: [true,  true,  false,   # x, y (position from VIO, ignore z)
               false, false, true,    # yaw from VIO
               true,  true,  false,   # x_vel, y_vel
               false, false, false]
    odom0_differential: false

    # IMU topic (ZED 2i)
    imu0: "/zed/zed_node/imu/data"
    imu0_config: [
      false, false, false,   # x, y, z (position not from IMU)
      true,  true,  true,    # roll, pitch, yaw (orientation from IMU)
      false, false, false,   # x_vel, y_vel, z_vel (velocity from GPS)
      true,  true,  true     # roll_vel, pitch_vel, yaw_vel (angular velocity)
    ]
    imu0_differential: false
    imu0_queue_size: 5
    imu0_remove_gravitational_acceleration: true

    # Tuning for robustness
    transform_time_offset: 0.0
    transform_timeout: 0.1     # Allow 100ms tolerance for stale data
    print_diagnostics: true    # Enable diagnostics for debugging